<html lang="ru" data-theme="dark">
<head>

  <link rel="stylesheet" href="../../css/main.css"/>
  <link rel="icon" type="image/png" href="../../img/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg" />
  <link rel="shortcut icon" href="../../img/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="../../img/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="MyWorlds" />
  <link rel="manifest" href="../../img/site.webmanifest" />
</head>
<body>

<header>
  <div class="nav-container">
    <h1 class="site-title"><a href="../../index.html">Миры</a> → 
	<a href="../evora-world.html">World</a> → 
	Информация</h1>
    <button class="theme-toggle" title="Сменить тему">☀️/🌙</button>
  </div>
</header>

<main>
  <a href="../evora-world.html" class="back-link">← Назад к миру World</a>

  <h1>Дополнительная информация</h1>
  <p style="margin-bottom: 3rem;">Здесь будут собраны общие сведения о мире, правилах, технологиях и обществе World.</p>

  <div class="admin-controls">
    <button class="admin-btn add" id="add-info-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Добавить информацию / раздел
    </button>
  </div>

  <div class="grid" style="margin-bottom: 4rem;">
    <a href="hybrid/inf.html" class="card">
      <div class="card-header">
        <h2 class="card-name">INF</h2>
      </div>
      <div class="card-body">
        <p>Краткая информация</p>
      </div>
    </a>

    <!-- сюда можно будет добавлять новые карточки -->
    <!--
    <a href="locations/locations.html" class="card">...</a>
    <a href="corporations/corporations.html" class="card">...</a>
    -->
  </div>

</main>

<footer>
  <p>World — справочная информация</p>
</footer>

<script>
// Загрузка и применение сохранённой темы при старте страницы
function applySavedTheme() {
  let theme = localStorage.getItem('theme');

  // Если темы нет в localStorage — берём системную предпочтение
  if (!theme) {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      theme = 'dark';
    } else {
      theme = 'light';
    }
  }

  document.documentElement.setAttribute('data-theme', theme);
}

// Обновление иконки кнопки
function updateThemeIcon() {
  const toggle = document.querySelector('.theme-toggle');
  if (!toggle) return; // защита, если кнопки ещё нет

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  toggle.textContent = isDark ? '☀️' : '🌙';
  toggle.setAttribute('title', isDark ? 'Перейти на светлую тему' : 'Перейти на тёмную тему');
}

// Переключение темы + сохранение + обновление иконки
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';

  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);

  updateThemeIcon();
}

// Запускаем применение темы сразу (не ждём DOMContentLoaded)
applySavedTheme();

// Ждём, когда кнопка появится в DOM, и обновляем иконку
document.addEventListener('DOMContentLoaded', () => {
  updateThemeIcon();

  const toggleBtn = document.querySelector('.theme-toggle');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', toggleTheme);
  } else {
    console.warn('Кнопка .theme-toggle не найдена на странице');
  }
});
</script>

<script>
  document.getElementById('add-info-btn')?.addEventListener('click', () => {
    alert('Добавление новой статьи/раздела информации (технологии, локации, правила и т.д.) — в разработке');
  });
</script>

</body>
</html>
