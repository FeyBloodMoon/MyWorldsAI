      Редактировать описание мира

<footer>
  <a href="https://mynickname.com/197371"><img src="../img/Zwerg Pferd.gif" alt="Zwerg Pferd" border="1" /></a>
  <a href="https://mynickname.com/197371"><img src="../img/FeyBM.gif" alt="FeyBM" border="1" /></a>
  <p>World</p>
</footer>

<script>
// Загрузка и применение сохранённой темы при старте страницы
function applySavedTheme() {
  let theme = localStorage.getItem('theme');

  // Если темы нет в localStorage — берём системную предпочтение
  if (!theme) {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      theme = 'dark';
    } else {
      theme = 'light';
    }
  }

  document.documentElement.setAttribute('data-theme', theme);
}

// Обновление иконки кнопки
function updateThemeIcon() {
  const toggle = document.querySelector('.theme-toggle');
  if (!toggle) return; // защита, если кнопки ещё нет

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  toggle.textContent = isDark ? '☀️' : '🌙';
  toggle.setAttribute('title', isDark ? 'Перейти на светлую тему' : 'Перейти на тёмную тему');
}

// Переключение темы + сохранение + обновление иконки
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';

  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);

  updateThemeIcon();
}

// Запускаем применение темы сразу (не ждём DOMContentLoaded)
applySavedTheme();

// Ждём, когда кнопка появится в DOM, и обновляем иконку
document.addEventListener('DOMContentLoaded', () => {
  updateThemeIcon();

  const toggleBtn = document.querySelector('.theme-toggle');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', toggleTheme);
  } else {
    console.warn('Кнопка .theme-toggle не найдена на странице');
  }
});
</script>

<script>
  document.getElementById('edit-world-evo')?.addEventListener('click', () => {
    alert('Редактирование описания мира "Эвора" — в разработке');
  });

  document.getElementById('add-section-evo')?.addEventListener('click', () => {
    alert('Добавление нового раздела (локация/фракция/технология) — в разработке');
  });
</script>

</body>
